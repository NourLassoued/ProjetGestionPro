<div class="login-page">

  <!-- Left: Illustration -->
  <div class="login-left">
    <div class="illustration-content">
      <div class="floating-card card-1">
        <i class='bx bxs-lock-alt'></i>
        <span>Secure Login</span>
      </div>
      <div class="floating-card card-2">
        <i class='bx bxs-dashboard'></i>
        <span>Dashboard</span>
      </div>
      <div class="floating-card card-3">
        <i class='bx bxs-rocket'></i>
        <span>Get Started</span>
      </div>
      <div class="illustration-text">
        <h2>Welcome back to<br>AdminHub</h2>
        <p>Sign in to manage your projects, track tasks, and collaborate with your team.</p>
      </div>
    </div>
  </div>

  <!-- Right: Form -->
  <div class="login-right">
    <div class="login-form-wrap">

      <!-- Logo -->
      <div class="login-brand">
        <div class="brand-icon"><i class='bx bxs-layer'></i></div>
        <span>AdminHub</span>
      </div>

      <h1>Sign in</h1>
      <p class="login-subtitle">Enter your credentials to access your account</p>

      <form (ngSubmit)="authenticate()">

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <i class='bx bx-envelope'></i>
            <input type="email" id="email" name="email"
                   [(ngModel)]="email"
                   placeholder="you@gmail.com" required>
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">
            Password
            <a class="forgot-link" routerLink="/PasswordReset">Forgot?</a>
          </label>
          <div class="input-wrap">
            <i class='bx bx-lock-alt'></i>
            <input type="password" id="password" name="password"
                   [(ngModel)]="password"
                   placeholder="Enter your password" required>
          </div>
        </div>

        <!-- Remember me -->
        <div class="remember-wrap">
          <input type="checkbox" id="remember">
          <label for="remember">Remember me</label>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login">
          <i class='bx bx-log-in'></i> Sign In
        </button>

      </form>

      <!-- Divider -->
      <div class="divider">
        <span>or</span>
      </div>

      <!-- Social buttons -->
      <div class="social-buttons">
        <button class="btn-social" title="Google">
          <i class='bx bxl-google'></i>
        </button>
        <button class="btn-social" title="Facebook">
          <i class='bx bxl-facebook'></i>
        </button>
        <button class="btn-social" title="LinkedIn">
          <i class='bx bxl-linkedin'></i>
        </button>
      </div>

      <!-- Register link -->
      <p class="register-link">
        Don't have an account? <a routerLink="/register">Create one</a>
      </p>

    </div>
  </div>

</div>
